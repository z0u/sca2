name: Deploy Docs to GitHub Pages

on:
  # Runs on pushes targeting the default branch
  push:
    branches: ["main"]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# The site deploys by pushing _site to the gh-pages branch (Pages source:
# "Deploy from a branch"). Branch-based deploys let PR previews live under
# pr-preview/<n>/ on the same site — an artifact deploy replaces the whole
# site, so previews couldn't survive a production deploy. See pr-preview.yml.
permissions:
  contents: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        # No report HTML in the repo (and no Git LFS). The notebooks are the source;
        # their exported bundles live on the HF bucket, synced by `./go publish`.

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Install Dependencies (for docs build)
        # The build imports mini.store / mini.hf_store, so it needs the project
        # (not just the pages group's markdown).
        run: uv sync --group pages

      - name: Build Site
        # Read-only, deterministic half of publishing: build_site pulls each synced
        # bundle from the publish tier, resolves author links against this checkout,
        # inserts one <base href> at exports/<key>/, and writes the HTML into _site. The
        # assets stay on the CDN; the agent did the export+upload (`./go publish`). A
        # read-only HF_TOKEN suffices — this job never writes or runs a notebook. (A
        # report not yet published is skipped with a warning, not an error; a bundle
        # missing an asset its page references fails the build, so an incomplete
        # publish can't deploy pages with figure-shaped holes.)
        #
        # Each report is fetched and based at the revision pinned in docs/publish.lock
        # (this checkout, i.e. main), so the deploy is reproducible and a later branch
        # publish can't swap assets under it — merging the pin is what changes the site.
        #
        # Set *whichever* variable matches your store layout — an undefined repo variable
        # expands to '' and is treated as unset, so leaving one blank is fine:
        #   - split store (#38): MINI_PUBLISH_REPO alone → serve exports off the public
        #     dataset repo (the bucket can be private; the build never reads it).
        #   - single bucket (default): MINI_STORE_BUCKET → serve exports off the bucket.
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          MINI_PUBLISH_REPO: ${{ vars.MINI_PUBLISH_REPO }}
          MINI_STORE_BUCKET: ${{ vars.MINI_STORE_BUCKET }}
        run: ./go site

      - name: Deploy to gh-pages
        # clean removes pages whose source is gone (a deleted report leaves the
        # site), but spares the PR previews, which have their own lifecycle
        # (pr-preview.yml tears each one down when its PR closes). force: false
        # rebases onto concurrent preview deploys instead of clobbering them.
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: _site
          branch: gh-pages
          clean: true
          clean-exclude: pr-preview/
          force: false
